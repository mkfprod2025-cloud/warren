name: Warren Bot Runner (BingX v4.0)

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      command:
        description: 'Action'
        required: true
        default: 'START'
        type: choice
        options: [START, STOP, UPDATE_CONFIG]

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Warren v4.0 Cycle
        env:
          BINGX_API_KEY: ${{ secrets.BINGX_API_KEY }}
          BINGX_SECRET_KEY: ${{ secrets.BINGX_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python bot.py

      - name: Final Commit and push (Sync Cloud)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add trades_history.json positions.json config.json index.html debug_api.json
          git commit -m "Warren v4.0: Cycle Sync + Debug" || echo "No changes"
          git push origin main --force
